<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <title>Carol Kopacek — Links</title>
  <meta name="description" content="Engenheira Mecânica, Inventora e Maker — links de Maria Carolina Kopacek" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1A1A1A;
      --surface: #2A2A2A;
      --border:  #3A3A3A;
      --fg:      #EFEFEF;
      --muted:   #999999;
      --accent:  #C87941;
      --accent-h:#E08B50;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 48px 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* Blueprint dot grid — matches hero section */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(200,121,65,0.12) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Avatar */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid var(--accent);
      margin-bottom: 16px;
    }

    /* Name */
    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--fg);
      margin-bottom: 6px;
      text-align: center;
    }

    /* Tagline */
    .tagline {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      max-width: 28ch;
      margin-bottom: 36px;
    }
    .tagline span {
      display: block;
      color: var(--accent);
      font-weight: 500;
      font-size: 0.78rem;
      margin-top: 2px;
    }

    /* Link buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
      cursor: pointer;
    }
    .link-btn:hover {
      border-color: var(--accent);
      background: #2E2E2E;
      transform: translateY(-2px);
    }
    .link-btn:active { transform: translateY(0); }

    .link-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: var(--accent);
      fill: currentColor;
    }

    .link-btn-label { flex: 1; }

    .link-btn-arrow {
      font-size: 0.8rem;
      color: var(--muted);
      transition: color 150ms ease;
    }
    .link-btn:hover .link-btn-arrow { color: var(--accent); }

    /* Primary button (portfolio) */
    .link-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }
    .link-btn.primary svg { color: var(--bg); }
    .link-btn.primary .link-btn-arrow { color: rgba(26,26,26,0.6); }
    .link-btn.primary:hover { background: var(--accent-h); border-color: var(--accent-h); }

    /* Handle / footer */
    .handle {
      margin-top: 36px;
      font-size: 0.78rem;
      color: var(--border);
      letter-spacing: 0.04em;
    }
  </style>
</head>
